services:
  server:
    image: ${DOCKERHUB_IMAGE:?set DOCKERHUB_IMAGE in .env or workflow}:${IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: gpt2api-server
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_HOST: ${MYSQL_HOST:?set MYSQL_HOST in .env}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-gpt2api}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gpt2api}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gpt2api}
      GPT2API_MYSQL_DSN: "${MYSQL_USER:-gpt2api}:${MYSQL_PASSWORD:-gpt2api}@tcp(${MYSQL_HOST}:${MYSQL_PORT:-3306})/${MYSQL_DATABASE:-gpt2api}?${MYSQL_DSN_PARAMS:-parseTime=true&loc=Local&charset=utf8mb4&collation=utf8mb4_unicode_ci}"
      GPT2API_REDIS_ADDR: "${REDIS_HOST:?set REDIS_HOST in .env}:${REDIS_PORT:-6379}"
      GPT2API_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      GPT2API_REDIS_DB: ${REDIS_DB:-0}
      GPT2API_BACKUP_DIR: /app/data/backups
      GPT2API_BACKUP_RETENTION: ${BACKUP_RETENTION:-30}
      GPT2API_BACKUP_ALLOW_RESTORE: ${BACKUP_ALLOW_RESTORE:-false}
      GPT2API_JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me_in_production_please_32b}
      GPT2API_CRYPTO_AES_KEY: ${CRYPTO_AES_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    ports:
      - "${HTTP_BIND_HOST:-127.0.0.1}:${HTTP_PORT:-8080}:8080"
    dns:
      - ${DNS_PRIMARY:-8.8.8.8}
      - ${DNS_FALLBACK:-1.1.1.1}
    volumes:
      - ${APP_BASE_DIR:-.}/configs:/app/configs:ro
      - backups:/app/data/backups
      - ${APP_BASE_DIR:-.}/logs:/app/logs
    command: ["/app/gpt2api", "-c", "/app/configs/config.yaml"]

volumes:
  backups:

networks:
  default:
    name: ${APP_NETWORK_NAME:-gpt2api-network}
    external: ${APP_NETWORK_EXTERNAL:-false}
